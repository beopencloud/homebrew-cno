name: Bump doorctl

on:
  repository_dispatch:
    types: [doorctl-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.4.2). Defaults to latest GitHub release."
        required: false
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          elif [ -n "$DISPATCH_TAG" ]; then
            tag="$DISPATCH_TAG"
          else
            tag="$(curl -fsSL https://api.github.com/repos/beopencloud/cno/releases/latest | jq -r .tag_name)"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Update doorctl.rb
        run: bash scripts/bump-doorctl.sh "${{ steps.release.outputs.tag }}"

      - name: Commit and push
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doorctl.rb
          if git diff --staged --quiet; then
            echo "doorctl.rb already up to date for ${TAG}"
            exit 0
          fi
          git commit -m "chore: bump doorctl to ${TAG#v}"
          git push
